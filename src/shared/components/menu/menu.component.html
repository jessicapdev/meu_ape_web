<div class="navbar-container">
    <div class="flex-container">
            <span (click)="navegarParaHome()" class="title-home icon-user">Meu apê na web</span>
        <div class="perfil-container">
            <div class="user-button">
                <button
                    appearance="secondary"
                    iconStart="@tui.user"
                    size="s"
                    tuiIconButton
                    type="button"
                    [style.border-radius.%]="100"
                    tuiChevron
                    [(tuiDropdownOpen)]="openDropPerfil"
                    [tuiDropdown]="contentPerfil"
                >
                    user
                </button>
                <ng-template #contentPerfil>
                    <tui-data-list role="menu">
                        <tui-opt-group>
                            <div class="menu-perfil"
                                (click)="navegarParaPerfil()" 
                                tuiOption>
                                Meu perfil
                            </div>
                            <div class="menu-perfil"
                                (click)="logout()" 
                                tuiOption>
                                Sair
                            </div>
                        </tui-opt-group>
                    </tui-data-list>
                </ng-template>
            </div>
            <button
                appearance="secondary"
                iconStart="@tui.search"
                size="s"
                tuiIconButton
                type="button"
                [style.border-radius.%]="100"
            >
                search
            </button>
        </div>
    </div>
</div>
