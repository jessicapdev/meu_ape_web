<!-- profile.component.html - versão corrigida -->
<div class="profile-container">
    <app-sidebar [isAdmin]="isAdmin" (menuItemClicked)="mudarAba($event)"></app-sidebar>
    
  <div class="profile-form">
    <!-- Seção de Dados Pessoais -->
    <div class="personal-data-section" *ngIf="currentTab === 'perfil'">
      <h3>Dados pessoais</h3>
      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
          <div class="form-row">
              <tui-textfield>
                  <label tuiLabel>Nome completo</label>
                  <input
                      placeholder="digite seu nome completo aqui..."
                      tuiTextfield
                      formControlName="nome"
                  />
              </tui-textfield>
          </div>
          <div class="form-row">
              <tui-textfield>
                  <label tuiLabel>Email</label>
                  <input
                      inputmode="email"
                      placeholder="digite seu email aqui..."
                      tuiTextfield
                      type="email"
                      formControlName="email"
                      [disabled]="true"
                      [readOnly]="true"
                  />
                  <tui-icon icon="@tui.mail" />
              </tui-textfield>
          </div>

          <div class="form-row">
                <tui-textfield>
                  <label tuiLabel>Telefone</label>
                  <input
                      autocomplete="tel"
                      mask="+55 (##) #####-####"
                      tuiInputPhone
                      formControlName="telefone"
                      [attr.pattern]="pattern"
                  />
              </tui-textfield>
          </div>
          
          <app-alert-message type="error" [message]="error.message" [show]="error.show"/>
          <app-alert-message type="success" [message]="success.message" [show]="success.show"/>
          
          <!-- Botões de Ação -->
          <div class="action-buttons">
              <button 
                type="submit"
                tuiButton
                size="m"
                appearance="primary"
                [disabled]="!profileForm.valid"
                [loading]="loading"
              >
                Salvar alterações
              </button>
          </div>
      </form>
    </div>

    <div class="personal-data-section" *ngIf="currentTab === 'mensagens-recebidas'">
      <h3>Mensagens Recebidas</h3>
      <app-mensagens-recebidas></app-mensagens-recebidas>
    </div>

    <div class="personal-data-section" *ngIf="currentTab === 'empreendimentos'">
      <h3>Empreendimentos</h3>
      <app-gerenciamento-empreendimento></app-gerenciamento-empreendimento>
    </div>

  </div>
</div>
