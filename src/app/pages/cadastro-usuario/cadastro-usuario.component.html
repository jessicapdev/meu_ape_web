<div class="card-align-center">
    <mat-card>
        <mat-card-title>Cadastro novo usuário</mat-card-title>
        <mat-card-content>
            <form [formGroup]="cadastroUsuarioForm">
                <div class="row-center">
                    <mat-form-field appearance="outline">
                        <mat-label>Nome</mat-label>
                        <input type="text" matInput placeholder="Nome completo" formControlName="nome" required>
                        <mat-error *ngIf="cadastroUsuarioForm.get('nome')?.hasError('required')"> Campo obrigatório </mat-error>
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Email</mat-label>
                        <input type="email" matInput placeholder="insira seu email" formControlName="email" required>
                        <mat-error *ngIf="cadastroUsuarioForm.get('email')?.hasError('required')"> Campo obrigatório </mat-error>
                        <mat-error *ngIf="cadastroUsuarioForm.get('email')?.hasError('email')"> Email inválido </mat-error>
                    </mat-form-field>
                </div>
                <div class="row-center">
                    <mat-form-field appearance="outline">
                        <mat-label *ngIf="selectedFiles; else newFile">{{selectedFiles.item(0).name}}</mat-label>
                        <ng-template #newFile>
                            <mat-label for="upload">Escolha o arquivo</mat-label>
                        </ng-template>
                        <input matInput disabled>
                        <input hidden (change)="onFileSelected($event)" #fileInput type="file" id="file">
                    </mat-form-field>
                    <button id="upload" mat-raised-button (click)="fileInput.click()" class="upload-button">
                        <mat-icon>search</mat-icon>
                    </button>
                </div>
                <div class="row-center">
                    <mat-form-field appearance="outline">
                        <mat-label>Senha</mat-label>
                        <input type="password" matInput placeholder="Insira sua senha" formControlName="senha" required>
                        <mat-error *ngIf="cadastroUsuarioForm.get('senha')?.hasError('required')"> Campo obrigatório </mat-error>
                        <mat-error *ngIf="cadastroUsuarioForm.get('senha')?.hasError('mustMatch')"> Senha não confere </mat-error>
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Confirmação</mat-label>
                        <input type="password" matInput placeholder="Confirme sua senha" formControlName="confirmacao" required>
                        <mat-error *ngIf="cadastroUsuarioForm.get('confirmacao')?.hasError('required')"> Campo obrigatório </mat-error>
                        <mat-error *ngIf="cadastroUsuarioForm.get('confirmacao')?.hasError('mustMatch')"> Senha não confere </mat-error>
                    </mat-form-field>
                </div>
            </form>
            <div *ngIf="error" class="error-message">
                {{ error }}
            </div>

            <div class="row-start">
                <button mat-raised-button type="submit" (click)="onSubmit()" [disabled]="!cadastroUsuarioForm.valid"> Cadastrar </button>
                <button mat-raised-button (click)="onCancel()"> Cancelar </button>
            </div>
        </mat-card-content>
    </mat-card>
</div>
